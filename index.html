<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban — Tablero de Tareas</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
  <h1>Kanban<span>.</span></h1>
  <h2>&copy;Jhon Escalona 2026</h2>
  <span class="header-sub">Tablero de tareas</span>
</div>

<div class="board" id="board"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Nueva tarea</h3>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="form-group">
      <label for="cardTitle">Título</label>
      <input type="text" id="cardTitle" placeholder="¿Qué hay que hacer?" maxlength="80">
    </div>
    <div class="form-group">
      <label for="cardDesc">Descripción</label>
      <textarea id="cardDesc" placeholder="Breve descripción..." rows="3" maxlength="200"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" id="modalCancel">Cancelar</button>
      <button class="btn btn-primary" id="modalSave">Guardar</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
